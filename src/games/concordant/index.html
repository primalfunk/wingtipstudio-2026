<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Concordant</title>
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700&display=swap");
    :root {
      --ui-bg: #050708;
      --ui-bg-deep: #0a0f12;
      --ui-panel: rgba(8, 12, 16, 0.82);
      --ui-panel-strong: rgba(7, 10, 14, 0.9);
      --ui-overlay: rgba(5, 8, 10, 0.72);
      --ui-line: rgba(120, 170, 180, 0.35);
      --ui-line-strong: rgba(120, 170, 180, 0.6);
      --ui-text: rgba(232, 242, 242, 0.95);
      --ui-muted: rgba(170, 188, 194, 0.7);
      --ui-accent: rgba(120, 200, 190, 0.95);
      --ui-accent-soft: rgba(120, 200, 190, 0.35);
      --ui-glow: rgba(120, 200, 190, 0.45);
      --ui-warm: rgba(210, 185, 150, 0.95);
      --ui-danger: rgba(200, 110, 110, 0.9);
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--ui-bg);
      color: var(--ui-text);
      font-family: "Orbitron", "Bank Gothic", "Eurostile", "Consolas", monospace;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ui-overlay);
      overflow: hidden;
    }
    .start-screen {
      pointer-events: none;
    }
    .overlay.start-screen {
      align-items: flex-start;
      padding-top: 6px;
    }
    .boot-screen {
      transition: opacity 0.35s ease;
    }
    .boot-screen.boot-exit {
      opacity: 0;
    }
    button {
      font-size: 20px;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--ui-line-strong);
      color: var(--ui-text);
    }
    .start-button.boot-indeterminate {
      position: relative;
      overflow: hidden;
    }
    .start-button.boot-indeterminate::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(120, 200, 190, 0.5), transparent);
      transform: translateX(-100%);
      animation: boot-sweep 1.1s linear infinite;
      pointer-events: none;
    }
    .start-button {
      margin-top: auto;
      margin-bottom: 50px;
    }
    @keyframes boot-sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .start-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      pointer-events: auto;
      min-height: calc(100vh - 12px);
      padding-bottom: 12px;
      box-sizing: border-box;
    }
    .start-title {
      font-size: 62px;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-family: "Oxanium", "Orbitron", "Bank Gothic", "Eurostile", "Consolas", monospace;
      text-shadow: 0 0 22px rgba(120, 220, 210, 0.55);
      animation: title-breathe 4.5s ease-in-out infinite;
      margin-top: 0;
      margin-bottom: 6px;
      padding: 14px 26px;
      text-align: center;
      background: rgba(6, 12, 16, 0.15);
      border: 1px solid rgba(120, 200, 190, 0.45);
      box-shadow: 0 0 24px rgba(120, 200, 190, 0.35);
      position: relative;
      z-index: 2;
      width: min(720px, calc(100vw - 60px));
      overflow: hidden;
    }
    .start-title::after {
      content: "";
      position: absolute;
      inset: -40% -120%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 130, 200, 0.45),
        rgba(120, 220, 210, 0.5),
        rgba(255, 210, 120, 0.45),
        transparent
      );
      transform: translateX(-120%);
      animation: title-shimmer 7s ease-in-out infinite;
      mix-blend-mode: screen;
      pointer-events: none;
    }
    @keyframes title-shimmer {
      0% { transform: translateX(-120%); }
      22% { transform: translateX(120%); }
      100% { transform: translateX(120%); }
    }
    .start-subtitle {
      font-size: 21px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.75;
      min-height: 24px;
    }
    .start-reset-hint {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ui-muted);
      opacity: 0.75;
    }
    .start-blurb {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: none;
      opacity: 0.7;
      max-width: 520px;
      text-align: center;
      line-height: 1.4;
      animation: title-breathe 4.5s ease-in-out infinite;
      margin-top: 0;
    }
    .start-subtitle-name {
      color: var(--ui-accent);
      animation: name-pulse 3.6s ease-in-out infinite;
    }
    .start-carousel {
      width: min(640px, 86vw);
      min-height: 260px;
      position: relative;
      margin-bottom: 14px;
      margin-top: clamp(40px, 10vh, 100px);
    }
    .start-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateX(26px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    .start-slide.is-active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .start-card {
      width: 100%;
      padding: 16px 20px 18px;
      border: 1px solid var(--ui-line);
      background: var(--ui-panel);
      box-shadow: 0 0 24px var(--ui-glow);
      text-transform: uppercase;
    }
    .start-legend {
      width: 100%;
    }
    .start-legend-title {
      font-size: 13px;
      letter-spacing: 4px;
      text-align: center;
      color: var(--ui-accent);
      margin-bottom: 10px;
    }
    .start-legend-list {
      display: grid;
      gap: 10px;
    }
    .start-legend-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: center;
    }
    .start-legend-icon {
      width: 30px;
      height: 30px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 0 8px var(--ui-glow));
    }
    .start-legend-icon.legend-ship {
      background-image: url("assets/ui/sprites/ship.png");
    }
    .start-legend-icon.legend-star {
      background-image: url("assets/ui/sprites/yellow_star.png");
    }
    .start-legend-icon.legend-asteroid {
      background-image: url("assets/ui/sprites/asteroid.png");
    }
    .start-legend-icon.legend-enemy {
      background-image: url("assets/ui/sprites/enemy_ship.png");
    }
    .start-legend-icon.legend-fuel {
      background-image: url("assets/ui/sprites/fuel.png");
    }
    .start-legend-icon.legend-resource-duo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      width: 34px;
    }
    .legend-resource-crystal {
      width: 14px;
      height: 18px;
      background-image: url("assets/ui/sprites/crystal.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: sepia(1) saturate(5);
    }
    .start-legend-icon.legend-survey {
      background-image: url("assets/ui/sprites/scan_point.png");
    }
    .start-legend-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .start-legend-name {
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--ui-text);
    }
    .start-legend-desc {
      font-size: 12px;
      letter-spacing: 0.6px;
      color: var(--ui-muted);
    }
    .start-controls-title,
    .start-scores-title {
      font-size: 13px;
      letter-spacing: 4px;
      text-align: center;
      color: var(--ui-accent);
      margin-bottom: 12px;
    }
    .start-controls-list {
      display: grid;
      gap: 12px;
    }
    .start-controls-item {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 14px;
      align-items: center;
    }
    .start-controls-keys {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--ui-text);
      padding: 6px 10px;
      border: 1px solid var(--ui-line);
      background: var(--ui-panel-strong);
      text-align: center;
      box-shadow: inset 0 0 10px rgba(80, 160, 160, 0.2);
    }
    .start-controls-desc {
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--ui-muted);
    }
    .start-scores-list {
      display: grid;
      gap: 6px;
      font-size: 13px;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }
    .start-scores-row {
      display: grid;
      grid-template-columns: 26px 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .start-scores-rank {
      color: var(--ui-muted);
      text-align: right;
    }
    .start-scores-name {
      color: var(--ui-text);
    }
    .start-scores-value {
      color: var(--ui-warm);
      letter-spacing: 2px;
    }
    .start-screen::before,
    .start-screen::after {
      content: "";
      position: absolute;
      inset: -10%;
      background-repeat: repeat;
      opacity: 0.35;
      pointer-events: none;
    }
    .start-screen::before {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(200,220,220,0.8) 60%, transparent 61%),
        radial-gradient(1px 1px at 80px 110px, rgba(190,210,210,0.6) 60%, transparent 61%),
        radial-gradient(1px 1px at 140px 60px, rgba(210,230,230,0.7) 60%, transparent 61%),
        radial-gradient(1px 1px at 60px 160px, rgba(160,200,200,0.7) 60%, transparent 61%),
        radial-gradient(1px 1px at 160px 20px, rgba(150,190,190,0.6) 60%, transparent 61%);
      background-size: 140px 140px;
      animation: drift-slow 28s linear infinite;
    }
    .start-screen::after {
      background-image:
        radial-gradient(2px 2px at 60px 40px, rgba(170,210,210,0.8) 60%, transparent 61%),
        radial-gradient(2px 2px at 120px 140px, rgba(170,210,210,0.6) 60%, transparent 61%),
        radial-gradient(1px 1px at 30px 150px, rgba(160,200,200,0.5) 60%, transparent 61%),
        radial-gradient(2px 2px at 200px 80px, rgba(210,230,230,0.7) 60%, transparent 61%),
        radial-gradient(1px 1px at 180px 200px, rgba(190,210,210,0.5) 60%, transparent 61%);
      background-size: 200px 200px;
      animation: drift-slower 48s linear infinite;
      opacity: 0.35;
    }
    .start-bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .start-bg-object {
      position: absolute;
      border-radius: 50%;
      opacity: 0.55;
      filter: blur(0.4px);
    }
    .start-bg-object.bg-star {
      background: radial-gradient(circle, rgba(210,230,230,0.9) 0%, rgba(120,200,190,0.65) 45%, rgba(120,200,190,0.0) 70%);
      box-shadow: 0 0 18px rgba(120,200,190,0.45);
    }
    .start-bg-object.bg-asteroid {
      background: radial-gradient(circle, rgba(120,120,120,0.9) 0%, rgba(90,90,90,0.75) 55%, rgba(60,60,60,0.2) 80%);
      box-shadow: 0 0 12px rgba(120,120,120,0.4);
      opacity: 0.45;
    }
    .start-panel {
      position: relative;
      z-index: 1;
    }
    .start-capsule {
      background: rgba(12, 20, 24, 0.88);
      border: 1px solid var(--ui-line-strong);
      color: var(--ui-text);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 16px;
      box-shadow:
        0 0 12px var(--ui-glow),
        inset 0 0 18px rgba(80, 160, 160, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .start-button {
      margin-top: auto;
      margin-bottom: 50px;
    }
    .start-capsule:hover,
    .start-capsule:focus {
      transform: translateY(-1px) scale(1.02);
      box-shadow:
        0 0 18px rgba(120, 200, 190, 0.6),
        inset 0 0 24px rgba(80, 160, 160, 0.3);
      background: rgba(18, 28, 32, 0.95);
      outline: none;
    }
    @keyframes drift-slow {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-180px, -220px, 0); }
    }
    @keyframes drift-slower {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-140px, -180px, 0); }
    }
    @keyframes title-breathe {
      0%, 100% {
        transform: scale(0.98);
        opacity: 0.85;
        text-shadow: 0 0 14px rgba(120, 200, 190, 0.2);
      }
      50% {
        transform: scale(1.02);
        opacity: 1;
        text-shadow: 0 0 26px rgba(120, 200, 190, 0.45);
      }
    }
    @keyframes name-pulse {
      0%, 100% {
        opacity: 0.65;
        text-shadow: 0 0 6px rgba(120, 200, 190, 0.2);
      }
      50% {
        opacity: 1;
        text-shadow: 0 0 14px rgba(120, 200, 190, 0.45);
      }
    }
    @keyframes new-score-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 8px rgba(120, 200, 190, 0.2);
      }
      50% {
        transform: scale(1.02);
        box-shadow: 0 0 16px rgba(120, 200, 190, 0.45);
      }
    }
    .gameover-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 32px;
      border: 2px solid var(--ui-line-strong);
      background: var(--ui-panel-strong);
    }
    .gameover-title {
      font-size: 44px;
      letter-spacing: 2px;
      color: var(--ui-accent);
    }
    .gameover-subtitle {
      font-size: 18px;
      opacity: 0.8;
    }
    .gameover-stats {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 6px;
      font-size: 18px;
      color: var(--ui-text);
    }
    .gameover-content {
      width: min(380px, 82vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }
    .leaderboard-wrap {
      width: 100%;
      padding: 10px 12px 12px;
      border: 1px solid var(--ui-line);
      background: var(--ui-panel);
      box-shadow: 0 0 16px rgba(120, 200, 190, 0.25);
      text-transform: uppercase;
    }
    .leaderboard-title {
      text-align: center;
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--ui-accent);
      margin-bottom: 10px;
    }
    .leaderboard-list {
      display: grid;
      gap: 6px;
      font-size: 13px;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }
    .leaderboard-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .leaderboard-rank {
      text-align: right;
      color: var(--ui-muted);
    }
    .leaderboard-name {
      color: var(--ui-text);
    }
    .leaderboard-score {
      color: var(--ui-warm);
      letter-spacing: 2px;
    }
      .leaderboard-row.is-new {
        background: rgba(120, 200, 190, 0.12);
        border: 1px solid rgba(120, 200, 190, 0.4);
        box-shadow: 0 0 12px rgba(120, 200, 190, 0.4);
        animation: new-score-pulse 1.1s ease-in-out infinite;
      }
      .upgrade-panel {
        width: min(520px, 86vw);
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        padding: 22px 26px;
        border: 2px solid var(--ui-line-strong);
        background: var(--ui-panel-strong);
      }
      .upgrade-title {
        font-size: 28px;
        letter-spacing: 3px;
        color: var(--ui-accent);
        text-transform: uppercase;
      }
      .upgrade-currency,
      .upgrade-tier {
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--ui-muted);
      }
      .upgrade-list {
        display: grid;
        gap: 10px;
      }
      .upgrade-row {
        display: grid;
        grid-template-columns: 1.4fr 0.7fr 0.8fr 0.5fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--ui-line);
        background: var(--ui-panel);
      }
      .upgrade-name {
        font-size: 14px;
        color: var(--ui-text);
      }
      .upgrade-level {
        font-size: 12px;
        letter-spacing: 1px;
        color: var(--ui-muted);
      }
      .upgrade-gain {
        font-size: 12px;
        letter-spacing: 1px;
        color: var(--ui-accent);
        text-align: right;
      }
      .upgrade-cost {
        font-size: 13px;
        color: var(--ui-warm);
        text-align: right;
      }
      .upgrade-button {
        font-size: 12px;
        padding: 6px 12px;
        letter-spacing: 1px;
      }
      .upgrade-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .upgrade-close {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 11px;
        padding: 6px 10px;
        letter-spacing: 1px;
      }
      .interact-button {
        position: absolute;
        right: 18px;
        bottom: 120px;
        font-size: 12px;
        padding: 10px 16px;
        letter-spacing: 2px;
        border-radius: 999px;
        background: rgba(8, 12, 16, 0.7);
        border: 1px solid var(--ui-line-strong);
        color: var(--ui-text);
      }
      .exit-button {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 14px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(8, 12, 16, 0.85);
        border: 1px solid var(--ui-line-strong);
        color: var(--ui-text);
        box-shadow: 0 0 12px rgba(120, 200, 190, 0.35);
        z-index: 6;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        padding: 0;
      }
      .exit-button:hover,
      .exit-button:focus {
        box-shadow: 0 0 18px rgba(120, 200, 190, 0.6);
        outline: none;
      }
      .start-screen-active .exit-button {
        display: none !important;
        pointer-events: none;
      }
      .terminate-button {
        position: absolute;
        font-size: 11px;
        padding: 8px 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(12, 18, 22, 0.92);
        border: 1px solid rgba(200, 110, 110, 0.8);
        color: rgba(255, 230, 210, 0.95);
        box-shadow: 0 0 12px rgba(200, 110, 110, 0.35);
        z-index: 6;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.2;
      }
    .score-entry {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--ui-line);
      background: var(--ui-panel-strong);
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .score-entry-label {
      font-size: 12px;
      letter-spacing: 3px;
      text-align: center;
      color: var(--ui-accent);
    }
    .score-entry-input {
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      padding: 8px 10px;
      border: 1px solid var(--ui-line-strong);
      background: rgba(12, 20, 24, 0.85);
      color: var(--ui-text);
      outline: none;
      box-shadow: inset 0 0 10px rgba(80, 160, 160, 0.2);
    }
    .score-entry-input:focus {
      border-color: rgba(120, 200, 190, 0.8);
      box-shadow: 0 0 10px rgba(120, 200, 190, 0.35);
    }
    .score-entry-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .score-entry-button {
      font-size: 14px;
      padding: 8px 18px;
      background: rgba(12, 20, 24, 0.9);
      border: 1px solid var(--ui-line-strong);
      color: var(--ui-text);
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .score-entry-button:hover,
    .score-entry-button:focus {
      transform: translateY(-1px);
      box-shadow: 0 0 12px rgba(120, 200, 190, 0.4);
      outline: none;
    }
    .score-entry-button.ghost {
      background: transparent;
      border-color: var(--ui-line);
      color: var(--ui-muted);
    }
    .level-complete-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 32px;
      border: 2px solid var(--ui-accent);
      background: var(--ui-panel-strong);
    }
    .level-complete-title {
      font-size: 38px;
      letter-spacing: 1px;
      color: var(--ui-accent);
    }
    .level-complete-subtitle {
      font-size: 16px;
      opacity: 0.85;
    }
    .ship-destroyed-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 22px 32px;
      border: 2px solid var(--ui-danger);
      background: var(--ui-panel-strong);
      box-shadow: 0 0 18px rgba(200, 110, 110, 0.25);
    }
    .ship-destroyed-title {
      font-size: 38px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ui-danger);
    }
    .ship-destroyed-subtitle {
      font-size: 16px;
      opacity: 0.85;
      letter-spacing: 1px;
    }
    @media (max-width: 420px), (max-height: 700px) {
      .start-panel {
        gap: 30px;
      }
      .start-title {
        font-size: 36px;
        letter-spacing: 4px;
